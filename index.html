<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वॉच कलेक्शन</title>
    <style>
        body { font-family: Arial, sans-serif; }
        header { background-color: #333; color: white; padding: 10px; text-align: center; }
        .container { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .card { background-color: white; border: 1px solid #ccc; width: 30%; margin: 20px; padding: 15px; }
        .card img { width: 100%; height: auto; }
        .card h2 { margin: 10px 0; font-size: 1.5em; }
        .card p { color: #666; font-size: 1em; }
    </style>
</head>
<body>
    <header>
        <h1>हमारी वॉच गैलरी</h1>
    </header>
    <div class="container">
        <div class="card">
            <img src="watch1.jpg" alt="क्लासिक वॉच">
            <h2>क्लासिक वॉच</h2>
            <p>एक एलिगेंट लुक जो हर मौके पर सूट करता है।</p>
        </div>
    </div>
</body>
</html>
