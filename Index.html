<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वॉच कलेक्शन</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; text-align: center; }
        header { background-color: #333; color: white; padding: 1rem 0; }
        .container { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .card { background-color: white; border: 1px solid #ddd; border-radius: 8px; width: 250px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: auto; border-radius: 4px; }
        .card h2 { margin: 10px 0; font-size: 1.2rem; }
        .card p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>हमारी वॉच गैलरी</h1>
    </header>

    <div class="container">
        <div class="card">
            <img src="watch1.jpg" alt="क्लासिक वॉच">
            <h2>क्लासिक वॉच</h2>
            <p>एक एलिगेंट लुक जो हर मौके पर सूट करता है।</p>
        </div>
        <div class="card">
            <img src="watch2.jpg" alt="स्पोर्ट्स वॉच">
            <h2>स्पोर्ट्स वॉच</h2>
            <p>आपके एक्टिव लाइफस्टाइल के लिए मजबूत और टिकाऊ।</p>
        </div>
    </div>

</body>
</html>
